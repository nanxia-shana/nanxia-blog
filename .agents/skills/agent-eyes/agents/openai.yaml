interface:
  display_name: "Agent Eyes"
  short_description: "Check plugin install; fetch selected UI context only when needed"
  default_prompt: "Use this skill to verify code-inspector-plugin is installed, help install it when missing, and request local Agent Eyes selected context only for element-anchored or ambiguous UI edits. Resolve baseUrl from explicit input first; otherwise resolve the explicit project path or current workspace path to a git root, read that git root .code-inspector/record.json, match the project directory by longest prefix, and probe only those candidate ports via /context/selected before the single fallback 5678. Do not use generic hidden-file search such as rg/find for .code-inspector discovery, and do not scan arbitrary common ports. If /context/selected returns data:null, continue with default workflow, skip selected-context injection only, and do not block or force element selection."
